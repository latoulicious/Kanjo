server {
    listen      8090;
    server_name _;

    # Defense-in-depth headers (app is also edge-gated by Cloudflare Access).
    add_header X-Frame-Options        "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options "nosniff"                       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    root  /usr/share/nginx/html;
    index index.html;

    # SPA — client-side routes fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + health proxied to the api service (single origin, no CORS). The api
    # container exists before web (depends_on), so this upstream resolves at boot.
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    location = /health {
        proxy_pass http://api:3000;
        access_log off;
    }
}
