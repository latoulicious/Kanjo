name: android

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["web/**"]

jobs:
  apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write # rolling "latest" release upload
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: npx cap sync android

      - name: Decode signing keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/kanjo-release.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KANJO_KEYSTORE_BASE64 }}

      - name: Build signed APK
        working-directory: web/android
        run: ./gradlew assembleRelease
        env:
          KANJO_KEYSTORE_PATH: ${{ github.workspace }}/web/android/kanjo-release.keystore
          KANJO_KEYSTORE_PASSWORD: ${{ secrets.KANJO_KEYSTORE_PASSWORD }}

      - name: Publish APK to rolling release
        if: github.ref == 'refs/heads/main'
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp web/android/app/build/outputs/apk/release/app-release.apk kanjo.apk
          gh release view latest >/dev/null 2>&1 || \
            gh release create latest --title "Kanjo APK (rolling)" --notes "Always the newest APK built from main." --prerelease
          gh release upload latest kanjo.apk --clobber
          gh release edit latest --notes "Built from \`${GITHUB_SHA::7}\` on $(date -u +%Y-%m-%d)."

      # Non-main runs (workflow_dispatch on branches) still get an artifact.
      - uses: actions/upload-artifact@v4
        if: github.ref != 'refs/heads/main'
        with:
          name: kanjo-apk
          path: web/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
